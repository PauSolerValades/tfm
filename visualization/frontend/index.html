<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Information Cascade Visualization</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0d1117; /* Dark background for exhibition */
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #stats {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 300px;
        background: rgba(20, 20, 30, 0.8);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        color: rgba(255,255,255,0.8);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #stats h2 {
        margin: 0 0 5px 0;
        font-size: 18px;
        color: white;
        text-align: center;
      }
      .stat-row {
        font-size: 14px;
        margin-bottom: 5px;
      }
      hr {
        width: 100%;
        border: 0;
        border-top: 1px solid rgba(255,255,255,0.1);
        margin: 10px 0;
      }
      .slider-container {
        display: flex;
        flex-direction: column;
        gap: 5px;
        width: 100%;
        font-size: 14px;
      }
      .slider-container label {
        display: flex;
        justify-content: space-between;
      }
      input[type="range"] {
        width: 100%;
        margin: 0;
      }
      .controls-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
      }
      #time-display {
        font-family: monospace;
        font-size: 1.2em;
        font-weight: bold;
        color: white;
      }
      #histogram-container {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 300px;
        height: 350px;
        background: rgba(20, 20, 30, 0.8);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        z-index: 10;
        display: flex;
        flex-direction: column;
      }
      #histogram-container h3 {
        margin: 10px 0 5px 0;
        font-size: 14px;
        color: rgba(255,255,255,0.8);
        text-align: center;
      }
      #histogram-container h3:first-child {
        margin-top: 0;
      }
      canvas.hist {
        flex: 1;
        width: 100%;
        min-height: 100px;
      }
    </style>
  </head>
  <body>
    <div id="stats">
      <h2>Information Cascade</h2>
      <div id="active-users" class="stat-row">Active Users: 0</div>
      <div id="total-posts" class="stat-row">Total Posts: 0</div>
      <div id="total-reposts" class="stat-row">Total Reposts: 0</div>
      
      <hr />

      <div class="slider-container">
        <label for="progress">Timeline</label>
        <input type="range" id="progress" min="0" max="1000" value="0" step="0.1" />
      </div>
      <div class="slider-container">
        <label for="speed"><span>Speed</span><span id="speed-val">1.0x</span></label>
        <input type="range" id="speed" min="0.1" max="20" value="1" step="0.1" />
      </div>
      
      <div class="controls-row">
        <div id="time-display">T: 0.0s</div>
        <button id="play-pause-btn">Play</button>
      </div>
    </div>

    <div id="histogram-container">
      <h3>Top 50 Posts</h3>
      <canvas id="histogram-canvas" class="hist"></canvas>
      <h3>Full Power Law</h3>
      <canvas id="full-histogram-canvas" class="hist"></canvas>
    </div>

    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
