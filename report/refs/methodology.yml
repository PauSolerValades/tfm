barabási2005bursts:
  type: Article
  title: The origin of bursts and heavy tails in human dynamics
  author: Barabási, Albert-László
  date: 2005-05-01
  page-range: 207-211
  abstract: "What determines the timing of human actions? A big question, but the science of human dynamics is here to tackle it. And its predictions are of practical value: for example, when ISPs decide what bandwidth an institution needs, they use a model of the likely timing and activity level of the individuals. Current models assume that an individual has a well defined probability of engaging in a specific action at a given moment, but evidence that the timing of human actions does not follow this pattern (of Poisson statistics) is emerging. Instead the delay between two consecutive events is best described by a heavy-tailed (power law) distribution. Albert-László Barabási proposes an explanation for the prevalence of this behaviour. The ‘bursty’ nature of human dynamics, he finds, is a fundamental consequence of decision making."
  serial-number:
      doi: "10.1038/nature03459"
      issn: "1476-4687"
  url:
    value: https://doi.org/10.1038/nature03459
    date: 2026-05-21
  parent:
      type: Periodical
      title: Nature
      volume: 435
      issue: 7039

